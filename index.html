<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCast Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="weather-card">

        <h1>🌤 SkyCast Pro</h1>

        <div class="search-box">
            <input
                id="cityInput"
                type="text"
                placeholder="Search city..."
            >
            <button onclick="searchWeather()">
                Search
            </button>
        </div>

        <div class="loader hidden" id="loader"></div>

        <div id="weatherContent">

            <div class="weather-icon" id="icon">
                ☀️
            </div>

            <h2 id="city">Raipur</h2>

            <div class="temp" id="temp">
                32°C
            </div>

            <div class="condition" id="condition">
                Sunny
            </div>

            <div class="stats">

                <div class="stat-card">
                    <h3>💧</h3>
                    <p>Humidity</p>
                    <span id="humidity">70%</span>
                </div>

                <div class="stat-card">
                    <h3>🌬</h3>
                    <p>Wind</p>
                    <span id="wind">12 km/h</span>
                </div>

                <div class="stat-card">
                    <h3>🌡</h3>
                    <p>Feels Like</p>
                    <span id="feels">34°C</span>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
